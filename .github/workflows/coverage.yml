name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6

      - name: Build dev image
        run: docker build -t iohttpparser-dev:coverage -f deploy/podman/Containerfile .

      - name: Run coverage
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            iohttpparser-dev:coverage \
            bash scripts/run-coverage.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/clang-coverage/coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/clang-coverage/coverage/coverage.lcov
          flags: unit
          fail_ci_if_error: false
