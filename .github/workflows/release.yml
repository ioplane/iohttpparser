name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build dev image
        run: docker build -t iohttpparser-dev:release -f deploy/podman/Containerfile .

      - name: Run release gate
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            iohttpparser-dev:release \
            bash scripts/run-release-gate.sh

      - name: Run release-candidate verification
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            iohttpparser-dev:release \
            bash scripts/run-release-candidate.sh

      - name: Build release assets
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            iohttpparser-dev:release \
            bash scripts/build-release-assets.sh "${GITHUB_REF_NAME}"

      - name: Upload release assets as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: dist/

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* \
            --title "iohttpparser ${GITHUB_REF_NAME}" \
            --notes-file dist/RELEASE_NOTES.md
