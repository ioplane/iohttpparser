name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build

      - name: Configure CodeQL build
        run: |
          cmake -S . -B build/codeql \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DIOHTTPPARSER_BUILD_TESTS=OFF \
            -DIOHTTPPARSER_BUILD_EXAMPLES=OFF \
            -DIOHTTPPARSER_BUILD_BENCH=OFF \
            -DIOHTTPPARSER_BUILD_FUZZ=OFF

      - name: Build CodeQL target
        run: cmake --build build/codeql -j"$(nproc)"

      - name: Analyze
        uses: github/codeql-action/analyze@v4
